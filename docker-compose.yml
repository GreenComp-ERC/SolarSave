version: '3.9'
services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 3000
    stdin_open: true
    tty: true

  simulator:
    build:
      context: ./Simulator
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./Simulator:/app

  blockchain:
    build:
      context: ./smart_contract
      dockerfile: Dockerfile
    ports:
      - "8545:8545"
    volumes:
      - ./smart_contract:/app
      - /app/node_modules
    command: npx hardhat node --hostname 0.0.0.0
